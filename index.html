<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-color: #f4f6f8;
    --container-bg: white;
    --text-color: #1a1a1a;
    --result-bg: #e9ecef;
    --button-bg: #0077ff;
    --button-hover-bg: #005fcc;
    --copy-button-bg: #28a745;
    --copy-button-hover-bg: #218838;
    --shadow-color: rgba(0, 0, 0, 0.1);
    --switch-bg: #ccc;
    --switch-slider-bg: white;
    --switch-slider-checked-bg: #0077ff;
    --input-border-color: #ccc;
}

body[data-theme="dark"] {
    --bg-color: #121212;
    --container-bg: #1e1e1e;
    --text-color: #f1f1f1;
    --result-bg: #2a2a2a;
    --shadow-color: rgba(0, 0, 0, 0.6);
    --switch-bg: #555;
    --input-border-color: #444;
}

body {
    font-family: 'Roboto', Arial, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    display: flex;
    flex-direction: column; /* Stack items vertically */
    justify-content: center;
    align-items: center;
    height: 100vh;
    gap: 2rem; /* Space between the two containers */
    transition: background 0.3s, color 0.3s;
}

.result-wrapper {width:90%;max-width:600px;display:flex;flex-direction:column;align-items:center;gap:1rem}
.result {
    width: 100%;
    padding: 20px;
    background: var(--container-bg);
    border-radius: 12px;
    box-shadow: 0 10px 25px var(--shadow-color);
    word-break: break-all;
    font-family: 'Roboto Mono', monospace;
    font-size: 2.25rem; /* Increased font size for better readability */
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-sizing: border-box;
}

.settings-container {background:var(--container-bg);padding:30px 40px;border-radius:12px;width:450px;box-shadow:0 10px 25px var(--shadow-color);transition:background .3s,box-shadow .3s;box-sizing:border-box}

.header-container {width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;gap:1rem;}
h1 {margin:0;font-size:1.75rem;text-align:left;white-space:nowrap;}
.controls-wrapper { display: flex; align-items: center; gap: 1rem; }

button {margin-top:20px;width:100%;padding:14px;border:none;background:var(--button-bg);color:white;font-size:17px;font-weight:700;border-radius:8px;cursor:pointer;transition:background-color .2s}
button:hover {background:var(--button-hover-bg)}
.copy {background:var(--copy-button-bg);width:auto;padding:12px 30px}
.copy:hover {background:var(--copy-button-hover-bg)}

.length-container{display:flex;flex-direction:column; margin-bottom: 20px;}
.length-container label{margin-bottom:8px;font-weight:700}
#length{width:100%;padding:8px;box-sizing:border-box;border-radius:6px;border:1px solid var(--input-border-color);background-color:var(--bg-color);color:var(--text-color);font-size:1rem}

.options{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.options label{display:flex;align-items:center;cursor:pointer}
.options input[type="checkbox"]{margin-right:10px;width:18px;height:18px}

.theme-switcher{position:relative;display:inline-block;width:50px;height:28px}.theme-switcher input{opacity:0;width:0;height:0}.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:var(--switch-bg);transition:.4s;border-radius:28px}.slider:before{position:absolute;content:"";height:20px;width:20px;left:4px;bottom:4px;background-color:var(--switch-slider-bg);transition:.4s;border-radius:50%}input:checked+.slider{background-color:var(--switch-slider-checked-bg)}input:checked+.slider:before{transform:translateX(22px)}

#language-selector {
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--input-border-color);
    background-color: var(--bg-color);
    color: var(--text-color);
    font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="result-wrapper">
    <div class="result" id="result"></div>
    <button class="copy" onclick="copyPassword(event)" data-lang-key="copyButton">Copy Password</button>
</div>

<div class="settings-container">
    <div class="header-container">
        <h1 data-lang-key="settingsTitle">Settings</h1>
        <div class="controls-wrapper">
            <select id="language-selector">
                <option value="en">EN</option>
                <option value="ko">KO</option>
            </select>
            <label class="theme-switcher">
                <input type="checkbox" id="theme-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="length-container">
        <label for="length" data-lang-key="lengthLabel">Password Length</label>
        <input type="number" id="length" value="16" min="4" max="50">
    </div>

    <div class="options">
        <label><input type="checkbox" id="uppercase" checked> <span data-lang-key="uppercaseLabel">Uppercase</span></label>
        <label><input type="checkbox" id="numbers" checked> <span data-lang-key="numbersLabel">Numbers</span></label>
        <label><input type="checkbox" id="lowercase" checked> <span data-lang-key="lowercaseLabel">Lowercase</span></label>
        <label><input type="checkbox" id="symbols" checked> <span data-lang-key="symbolsLabel">Symbols</span></label>
    </div>

    <button onclick="generatePassword()" data-lang-key="generateButton">Generate New Password</button>
</div>

<script>
const translations = {
    en: {
        settingsTitle: "Settings",
        lengthLabel: "Password Length",
        uppercaseLabel: "Uppercase",
        lowercaseLabel: "Lowercase",
        numbersLabel: "Numbers",
        symbolsLabel: "Symbols",
        generateButton: "Generate New Password",
        copyButton: "Copy Password",
        copied: "Copied!",
        selectOption: "Select an option"
    },
    ko: {
        settingsTitle: "설정",
        lengthLabel: "비밀번호 길이",
        uppercaseLabel: "대문자",
        lowercaseLabel: "소문자",
        numbersLabel: "숫자",
        symbolsLabel: "기호",
        generateButton: "새 비밀번호 생성",
        copyButton: "비밀번호 복사",
        copied: "복사 완료!",
        selectOption: "옵션을 선택하세요"
    }
};

const themeToggle = document.getElementById('theme-toggle');
const resultEl = document.getElementById('result');
const langSelector = document.getElementById('language-selector');

function updateLanguage(lang) {
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-lang-key]').forEach(el => {
        const key = el.dataset.langKey;
        if (translations[lang][key]) {
            el.textContent = translations[lang][key];
        }
    });
    // When language changes, we need to regenerate password to update placeholder text if needed
    generatePassword();
}

langSelector.addEventListener('change', (e) => {
    updateLanguage(e.target.value);
});

// Auto-detect language and set initial state
const userLang = navigator.language || navigator.userLanguage;
if (userLang.startsWith('ko')) {
    langSelector.value = 'ko';
}


if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    themeToggle.checked = true;
    document.body.setAttribute('data-theme', 'dark');
}

themeToggle.addEventListener('change', function() {
    document.body.setAttribute('data-theme', this.checked ? 'dark' : 'light');
});

function generatePassword() {
    const length = document.getElementById("length").value;
    const uppercaseChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const lowercaseChars = "abcdefghijklmnopqrstuvwxyz";
    const numberChars = "0123456789";
    const symbolChars = "!@#$%^&*()_+";

    let availableChars = "";
    let guaranteedChars = [];

    if (document.getElementById("uppercase").checked) { availableChars += uppercaseChars; guaranteedChars.push(uppercaseChars[Math.floor(Math.random() * uppercaseChars.length)]); }
    if (document.getElementById("lowercase").checked) { availableChars += lowercaseChars; guaranteedChars.push(lowercaseChars[Math.floor(Math.random() * lowercaseChars.length)]); }
    if (document.getElementById("numbers").checked) { availableChars += numberChars; guaranteedChars.push(numberChars[Math.floor(Math.random() * numberChars.length)]); }
    if (document.getElementById("symbols").checked) { availableChars += symbolChars; guaranteedChars.push(symbolChars[Math.floor(Math.random() * symbolChars.length)]); }

    const currentLang = langSelector.value;
    if(availableChars.length === 0 || length <= 0){
        resultEl.textContent = translations[currentLang].selectOption;
        resultEl.dataset.rawPassword = "";
        return;
    }

    let password = [];
    if (length < guaranteedChars.length) {
        password = guaranteedChars.slice(0, length);
    } else {
        password = guaranteedChars.slice();
        const remainingLength = length - guaranteedChars.length;
        for (let i = 0; i < remainingLength; i++) {
            password.push(availableChars.charAt(Math.floor(Math.random() * availableChars.length)));
        }
    }

    password = password.sort(() => Math.random() - 0.5);
    
    const finalPassword = password.join('');
    
    resultEl.textContent = finalPassword;
    resultEl.dataset.rawPassword = finalPassword;
}

function copyPassword(event) {
    let text = resultEl.dataset.rawPassword;
    if (!text) return;
    const currentLang = langSelector.value;
    navigator.clipboard.writeText(text).then(() => {
        const button = event.target;
        // We need to find the original text from translations
        const originalTextKey = button.dataset.langKey;
        const originalText = translations[currentLang][originalTextKey];

        button.textContent = translations[currentLang].copied;
        setTimeout(() => { button.textContent = originalText; }, 1500);
    });
}

document.querySelectorAll('.settings-container input').forEach(input => {
    input.addEventListener('input', generatePassword);
});

window.addEventListener('load', () => {
    updateLanguage(langSelector.value);
});

</script>
</body>
</html>
