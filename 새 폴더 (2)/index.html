<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

.result{
    margin-top:15px;
    padding:10px;
    background:#eee;
    border-radius:5px;
    word-break:break-all;
}

button{
    margin-top:15px;
    width:100%;
    padding:10px;
    border:none;
    background:#0077ff;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#005fcc;
}

.copy{
    background:#28a745;
}
</style>

</head>

<body>

<div class="container">

<h1>Password Generator</h1>

<label>Password Length</label>
<input type="number" id="length" value="12" min="4" max="50">

<br><br>

<label><input type="checkbox" id="uppercase" checked> Uppercase</label><br>
<label><input type="checkbox" id="lowercase" checked> Lowercase</label><br>
<label><input type="checkbox" id="numbers" checked> Numbers</label><br>
<label><input type="checkbox" id="symbols"> Symbols</label>

<button onclick="generatePassword()">Generate Password</button>

<div class="result" id="result">Your password will appear here</div>

<button class="copy" onclick="copyPassword()">Copy Password</button>

</div>

<script>

function generatePassword(){

let length = document.getElementById("length").value;

let uppercase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let lowercase = "abcdefghijklmnopqrstuvwxyz";
let numbers = "0123456789";
let symbols = "!@#$%^&*()_+";

let chars = "";

if(document.getElementById("uppercase").checked)
chars += uppercase;

if(document.getElementById("lowercase").checked)
chars += lowercase;

if(document.getElementById("numbers").checked)
chars += numbers;

if(document.getElementById("symbols").checked)
chars += symbols;

let password = "";

for(let i=0;i<length;i++){
password += chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("result").innerText = password;

}

function copyPassword(){

let text = document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Password copied!");

}

</script>

</body>
</html>
